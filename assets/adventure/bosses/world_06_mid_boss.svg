<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="grad-metal" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#cfd8dc"/>
      <stop offset="75%" stop-color="#78909c"/>
      <stop offset="100%" stop-color="#37474f"/>
    </radialGradient>
    <linearGradient id="grad-eye" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffeb3b"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </linearGradient>
  </defs>
  <!-- 바닥 그림자 -->
  <ellipse cx="400" cy="720" rx="240" ry="40" fill="#000" opacity="0.35"/>

  <!-- 귀 위치 톱니바퀴 (좌/우) -->
  <g fill="#546e7a" stroke="#263238" stroke-width="8">
    <!-- 왼쪽 톱니 -->
    <path d="M 200 350 L 150 310 L 130 350 L 150 390 Z"/>
    <path d="M 200 350 L 160 270 L 190 260 L 210 300 Z"/>
    <path d="M 200 350 L 160 430 L 190 440 L 210 400 Z"/>
    <circle cx="200" cy="350" r="50"/>
    
    <!-- 오른쪽 톱니 -->
    <path d="M 600 350 L 650 310 L 670 350 L 650 390 Z"/>
    <path d="M 600 350 L 640 270 L 610 260 L 590 300 Z"/>
    <path d="M 600 350 L 640 430 L 610 440 L 590 400 Z"/>
    <circle cx="600" cy="350" r="50"/>
  </g>
  <circle cx="200" cy="350" r="20" fill="#cfd8dc" stroke="#263238" stroke-width="4"/>
  <circle cx="600" cy="350" r="20" fill="#cfd8dc" stroke="#263238" stroke-width="4"/>

  <!-- 바디/어깨 (금속) -->
  <rect x="260" y="520" width="280" height="160" rx="30" fill="url(#grad-metal)" stroke="#263238" stroke-width="12"/>
  <!-- 가슴 전력 코어 -->
  <circle cx="400" cy="600" r="40" fill="#00e5ff" stroke="#263238" stroke-width="6"/>
  <polygon points="400,580 420,610 380,610" fill="#fff"/>

  <!-- 목 -->
  <rect x="350" y="460" width="100" height="80" fill="#455a64" stroke="#263238" stroke-width="8"/>

  <!-- 머리 (큐브) -->
  <rect x="230" y="200" width="340" height="280" rx="40" fill="url(#grad-metal)" stroke="#263238" stroke-width="12"/>

  <!-- 경고등 안테나 -->
  <rect x="385" y="120" width="30" height="80" fill="#546e7a" stroke="#263238" stroke-width="8"/>
  <circle cx="400" cy="100" r="25" fill="#ff1744" stroke="#263238" stroke-width="6"/>

  <!-- 눈 부분 (일자형 바이저 또는 사각형 눈) -->
  <rect x="280" y="270" width="240" height="80" rx="20" fill="#212121" stroke="#263238" stroke-width="8"/>
  <!-- 빛나는 눈빛 -->
  <circle cx="340" cy="310" r="22" fill="url(#grad-eye)"/>
  <circle cx="340" cy="310" r="8" fill="#fff"/>
  
  <circle cx="460" cy="310" r="22" fill="url(#grad-eye)"/>
  <circle cx="460" cy="310" r="8" fill="#fff"/>

  <!-- 볼 나사 -->
  <circle cx="270" cy="420" r="12" fill="#455a64" stroke="#263238" stroke-width="4"/>
  <circle cx="530" cy="420" r="12" fill="#455a64" stroke="#263238" stroke-width="4"/>

  <!-- 입 (일자 LED 슬롯) -->
  <rect x="350" y="390" width="100" height="20" rx="10" fill="#00e5ff" stroke="#263238" stroke-width="4"/>
</svg>
