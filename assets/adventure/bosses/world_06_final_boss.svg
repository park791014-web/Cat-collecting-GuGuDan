<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="grad-megametal" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="65%" stop-color="#455a64"/>
      <stop offset="100%" stop-color="#1c313a"/>
    </radialGradient>
    <linearGradient id="grad-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="100%" stop-color="#00251a"/>
    </linearGradient>
  </defs>
  <!-- 바닥 그림자 -->
  <ellipse cx="400" cy="740" rx="320" ry="45" fill="#000" opacity="0.4"/>

  <!-- 어깨 대형 포드 (좌/우) -->
  <rect x="120" y="460" width="130" height="200" rx="40" fill="url(#grad-megametal)" stroke="#1c313a" stroke-width="12"/>
  <circle cx="185" cy="520" r="25" fill="#ff1744" stroke="#1c313a" stroke-width="6"/>

  <rect x="550" y="460" width="130" height="200" rx="40" fill="url(#grad-megametal)" stroke="#1c313a" stroke-width="12"/>
  <circle cx="615" cy="520" r="25" fill="#ff1744" stroke="#1c313a" stroke-width="6"/>

  <!-- 메인 몸체 (메인프레임) -->
  <rect x="220" y="480" width="360" height="230" rx="50" fill="url(#grad-megametal)" stroke="#1c313a" stroke-width="12"/>
  <!-- 게이지 장치들 -->
  <rect x="270" y="550" width="120" height="40" rx="8" fill="#212121" stroke="#1c313a" stroke-width="4"/>
  <rect x="275" y="560" width="80" height="20" fill="#00e5ff"/>

  <circle cx="460" cy="570" r="20" fill="#ffeb3b" stroke="#1c313a" stroke-width="4"/>
  <circle cx="510" cy="570" r="20" fill="#00e676" stroke="#1c313a" stroke-width="4"/>

  <!-- 목 -->
  <rect x="330" y="410" width="140" height="90" fill="#37474f" stroke="#1c313a" stroke-width="8"/>
  <line x1="330" y1="440" x2="470" y2="440" stroke="#1c313a" stroke-width="8"/>
  <line x1="330" y1="465" x2="470" y2="465" stroke="#1c313a" stroke-width="8"/>

  <!-- 모니터 머리 -->
  <rect x="180" y="160" width="440" height="300" rx="60" fill="url(#grad-megametal)" stroke="#1c313a" stroke-width="12"/>
  
  <!-- 모니터 유리 베젤 -->
  <rect x="210" y="190" width="380" height="240" rx="30" fill="url(#grad-screen)" stroke="#1c313a" stroke-width="8"/>

  <!-- 모니터 오류 안테나 귀 -->
  <line x1="180" y1="250" x2="130" y2="210" stroke="#1c313a" stroke-width="10" stroke-linecap="round"/>
  <circle cx="130" cy="210" r="16" fill="#00e5ff" stroke="#1c313a" stroke-width="4"/>
  <line x1="620" y1="250" x2="670" y2="210" stroke="#1c313a" stroke-width="10" stroke-linecap="round"/>
  <circle cx="670" cy="210" r="16" fill="#00e5ff" stroke="#1c313a" stroke-width="4"/>

  <!-- 스크린 눈빛 (에러 경고등 텍스트와 분노 형상) -->
  <path d="M 260 260 L 320 280 L 320 300 L 260 280 Z" fill="#ff1744"/>
  <path d="M 540 260 L 480 280 L 480 300 L 540 280 Z" fill="#ff1744"/>
  <circle cx="290" cy="310" r="25" fill="#ff1744"/>
  <circle cx="290" cy="310" r="8" fill="#fff"/>
  <circle cx="510" cy="310" r="25" fill="#ff1744"/>
  <circle cx="510" cy="310" r="8" fill="#fff"/>

  <!-- 화면 중앙의 디지털 입맥선 -->
  <path d="M 330 380 Q 400 340 470 380" fill="none" stroke="#ff1744" stroke-width="10" stroke-linecap="round"/>
</svg>
