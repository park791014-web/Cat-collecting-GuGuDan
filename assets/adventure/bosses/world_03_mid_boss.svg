<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- 황동/브론즈 금속 그라데이션 -->
    <radialGradient id="grad-brass" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="60%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#8d6e63"/>
    </radialGradient>
    <linearGradient id="grad-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
  </defs>
  <!-- 바닥 그림자 -->
  <ellipse cx="400" cy="720" rx="220" ry="40" fill="#000" opacity="0.3"/>

  <!-- 등 뒤 거대 태엽 (배경 회전 핀) -->
  <g transform="translate(400, 390)">
    <circle cx="0" cy="0" r="130" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="10"/>
    <!-- 태엽 날들 (8개) -->
    <rect x="-20" y="-160" width="40" height="50" rx="8" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="8"/>
    <rect x="-20" y="110" width="40" height="50" rx="8" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="8" transform="rotate(45)"/>
    <rect x="-20" y="110" width="40" height="50" rx="8" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="8" transform="rotate(90)"/>
    <rect x="-20" y="110" width="40" height="50" rx="8" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="8" transform="rotate(135)"/>
    <rect x="-20" y="110" width="40" height="50" rx="8" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="8" transform="rotate(180)"/>
    <rect x="-20" y="110" width="40" height="50" rx="8" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="8" transform="rotate(225)"/>
    <rect x="-20" y="110" width="40" height="50" rx="8" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="8" transform="rotate(270)"/>
    <rect x="-20" y="110" width="40" height="50" rx="8" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="8" transform="rotate(315)"/>
    <circle cx="0" cy="0" r="60" fill="#8d6e63" stroke="#5d4037" stroke-width="8"/>
    <!-- 태엽 구멍 -->
    <circle cx="0" cy="0" r="25" fill="#3e2723"/>
  </g>

  <!-- 다리 (기계 관절) -->
  <rect x="310" y="580" width="60" height="120" rx="20" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="10"/>
  <rect x="430" y="580" width="60" height="120" rx="20" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="10"/>
  <!-- 무릎 둥근 관절 핀 -->
  <circle cx="340" cy="640" r="16" fill="#8d6e63" stroke="#5d4037" stroke-width="6"/>
  <circle cx="460" cy="640" r="16" fill="#8d6e63" stroke="#5d4037" stroke-width="6"/>

  <!-- 몸통 (둥근 기계 몸체) -->
  <rect x="270" y="390" width="260" height="210" rx="40" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="12"/>
  <!-- 가슴 경비 데칼 심볼 (별) -->
  <polygon points="400,440 408,458 428,458 412,470 418,490 400,478 382,490 388,470 372,458 392,458" fill="#ffd600" stroke="#5d4037" stroke-width="3"/>

  <!-- 장난감 검 (오른손) -->
  <g transform="rotate(-15 180 500)">
    <!-- 검날 -->
    <path d="M 170 260 L 190 260 L 195 440 L 165 440 Z" fill="#cfd8dc" stroke="#546e7a" stroke-width="8"/>
    <!-- 코 가드 -->
    <rect x="150" y="440" width="60" height="15" rx="5" fill="#ffd54f" stroke="#5d4037" stroke-width="6"/>
    <!-- 손잡이 -->
    <rect x="172" y="455" width="16" height="60" fill="#8d6e63" stroke="#5d4037" stroke-width="6"/>
  </g>

  <!-- 장난감 방패 (왼손) -->
  <g transform="rotate(15 620 500)">
    <path d="M 570 420 L 670 420 L 650 540 Q 620 590 590 540 Z" fill="url(#grad-shield)" stroke="#37474f" stroke-width="10"/>
    <polygon points="620,450 635,480 605,480" fill="#ff1744"/>
  </g>

  <!-- 목 조인트 -->
  <rect x="360" y="340" width="80" height="60" fill="#8d6e63" stroke="#5d4037" stroke-width="8"/>

  <!-- 머리 (둥근 원통 실린더형 머리) -->
  <rect x="280" y="160" width="240" height="200" rx="50" fill="url(#grad-brass)" stroke="#5d4037" stroke-width="12"/>

  <!-- 눈 (나사 모양 기계 눈) -->
  <circle cx="340" cy="240" r="30" fill="#ffffff" stroke="#5d4037" stroke-width="8"/>
  <!-- 나사 십자 무늬 -->
  <line x1="325" y1="240" x2="355" y2="240" stroke="#3e2723" stroke-width="8" stroke-linecap="round"/>
  <line x1="340" y1="225" x2="340" y2="255" stroke="#3e2723" stroke-width="8" stroke-linecap="round"/>

  <circle cx="460" cy="240" r="30" fill="#ffffff" stroke="#5d4037" stroke-width="8"/>
  <line x1="445" y1="240" x2="475" y2="240" stroke="#3e2723" stroke-width="8" stroke-linecap="round"/>
  <line x1="460" y1="225" x2="460" y2="255" stroke="#3e2723" stroke-width="8" stroke-linecap="round"/>

  <!-- 기계 볼 나사 -->
  <circle cx="295" cy="300" r="12" fill="#8d6e63" stroke="#5d4037" stroke-width="4"/>
  <circle cx="505" cy="300" r="12" fill="#8d6e63" stroke="#5d4037" stroke-width="4"/>

  <!-- 일자형 그릴 입 -->
  <rect x="350" y="290" width="100" height="25" rx="5" fill="#3e2723"/>
  <line x1="375" y1="290" x2="375" y2="315" stroke="#8d6e63" stroke-width="4"/>
  <line x1="400" y1="290" x2="400" y2="315" stroke="#8d6e63" stroke-width="4"/>
  <line x1="425" y1="290" x2="425" y2="315" stroke="#8d6e63" stroke-width="4"/>
</svg>
