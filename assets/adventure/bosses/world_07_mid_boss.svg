<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="grad-octopus" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ba68c8"/>
      <stop offset="70%" stop-color="#8e24aa"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </radialGradient>
    <radialGradient id="grad-meteor" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#37474f"/>
    </radialGradient>
  </defs>
  <!-- 바닥 그림자 -->
  <ellipse cx="400" cy="730" rx="220" ry="35" fill="#000" opacity="0.25"/>

  <!-- 뒤쪽 다리들 -->
  <path d="M 230 500 Q 150 630 250 670 Q 300 600 300 550" fill="#8e24aa" stroke="#4a148c" stroke-width="8"/>
  <path d="M 570 500 Q 650 630 550 670 Q 500 600 500 550" fill="#8e24aa" stroke="#4a148c" stroke-width="8"/>

  <!-- 몸통/머리 (동그란 형태) -->
  <circle cx="400" cy="400" r="210" fill="url(#grad-octopus)" stroke="#4a148c" stroke-width="12"/>

  <!-- 앞쪽 다리들 -->
  <path d="M 280 540 Q 220 730 350 710 Q 380 650 360 570" fill="url(#grad-octopus)" stroke="#4a148c" stroke-width="10"/>
  <path d="M 520 540 Q 580 730 450 710 Q 420 650 440 570" fill="url(#grad-octopus)" stroke="#4a148c" stroke-width="10"/>
  <path d="M 400 580 Q 400 750 420 740 Q 430 650 410 590" fill="url(#grad-octopus)" stroke="#4a148c" stroke-width="10"/>
  <!-- 빨판 장식 -->
  <circle cx="260" cy="650" r="12" fill="#e1bee7"/>
  <circle cx="300" cy="680" r="12" fill="#e1bee7"/>
  <circle cx="540" cy="650" r="12" fill="#e1bee7"/>
  <circle cx="500" cy="680" r="12" fill="#e1bee7"/>

  <!-- 외계인 눈 (3개) -->
  <!-- 왼쪽 눈 -->
  <circle cx="300" cy="350" r="40" fill="#ffffff" stroke="#4a148c" stroke-width="8"/>
  <circle cx="300" cy="350" r="18" fill="#ffd600"/>
  <circle cx="300" cy="350" r="8" fill="#000"/>
  <circle cx="295" cy="345" r="5" fill="#fff"/>

  <!-- 가운데 눈 (더 큼) -->
  <circle cx="400" cy="280" r="55" fill="#ffffff" stroke="#4a148c" stroke-width="10"/>
  <circle cx="400" cy="280" r="25" fill="#ffd600"/>
  <circle cx="400" cy="280" r="12" fill="#000"/>
  <circle cx="392" cy="272" r="8" fill="#fff"/>

  <!-- 오른쪽 눈 -->
  <circle cx="500" cy="350" r="40" fill="#ffffff" stroke="#4a148c" stroke-width="8"/>
  <circle cx="500" cy="350" r="18" fill="#ffd600"/>
  <circle cx="500" cy="350" r="8" fill="#000"/>
  <circle cx="495" cy="345" r="5" fill="#fff"/>

  <!-- 부끄러운 뺨 (우주 광선 느낌) -->
  <ellipse cx="250" cy="420" rx="20" ry="12" fill="#e040fb" opacity="0.6"/>
  <ellipse cx="550" cy="420" rx="20" ry="12" fill="#e040fb" opacity="0.6"/>

  <!-- 비웃는 입 -->
  <path d="M 370 450 Q 400 490 430 450" fill="none" stroke="#4a148c" stroke-width="8" stroke-linecap="round"/>

  <!-- 주변 공전 운석 (3개) -->
  <g stroke="#37474f" stroke-width="4">
    <circle cx="150" cy="240" r="30" fill="url(#grad-meteor)"/>
    <circle cx="650" cy="280" r="45" fill="url(#grad-meteor)"/>
    <circle cx="600" cy="550" r="25" fill="url(#grad-meteor)"/>
  </g>
  <!-- 궤도 선 (점선 효과) -->
  <path d="M 120 250 Q 400 150 680 290" fill="none" stroke="#e1bee7" stroke-width="3" stroke-dasharray="10, 15" opacity="0.5"/>
</svg>
