<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 육각형 눈꽃/얼음 결정 -->
  <polygon points="50,5 90,30 90,70 50,95 10,70 10,30" fill="#e0f7fa" stroke="#00acc1" stroke-width="4"/>
  <!-- 내부 결정 줄기 -->
  <line x1="50" y1="5" x2="50" y2="95" stroke="#00acc1" stroke-width="3"/>
  <line x1="10" y1="30" x2="90" y2="70" stroke="#00acc1" stroke-width="3"/>
  <line x1="10" y1="70" x2="90" y2="30" stroke="#00acc1" stroke-width="3"/>
  <!-- 안쪽 작은 마름모 -->
  <polygon points="50,30 70,50 50,70 30,50" fill="#80deea" opacity="0.8"/>
</svg>
